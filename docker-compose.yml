services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      # `db` is the compose service hostname.
      DATABASE_URL: postgresql+asyncpg://analytics:analytics@db:5432/analytics
      # Defaults to the zero-dependency deterministic mock; override from the
      # host for real embeddings (needs an image built with --extra local):
      #   EMBEDDING_MODE=local docker compose up
      EMBEDDING_MODE: ${EMBEDDING_MODE:-mock}
      EMBEDDING_DIM: "384"
      CHROMA_DIR: /data/chroma
      CHROMA_COLLECTION: events
    ports:
      - "8000:8000"
    volumes:
      - chromadata:/data/chroma
    depends_on:
      db:
        condition: service_healthy
    # Tables are created on startup by the app's lifespan (see db/init_db.py).

volumes:
  pgdata:
  chromadata:
